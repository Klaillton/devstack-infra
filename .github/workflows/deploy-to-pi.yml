name: Deploy devstack (Docker Compose) to devserverpi

on:
  push:
    branches: [ main, master ]
    paths:
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/deploy-to-pi.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy infra to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEVPI_HOST }}
          username: ${{ secrets.DEVPI_USER }}
          key: ${{ secrets.DEVPI_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "Updating devstack on Pi..."
            cd /home/dante/devstack
            git fetch origin
            git checkout ${GITHUB_REF#refs/heads/}
            git pull --ff-only origin ${GITHUB_REF#refs/heads/}

            # Load env and restart services
            docker compose --env-file .env up -d --remove-orphans

            echo "devstack deployed successfully at $(date)"
            docker compose ps
